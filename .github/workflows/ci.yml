name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/
      - run: ruff format --check backend/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest backend/tests/ -x -v --tb=short
        env:
          BOT_TOKEN: "test:fake_token_for_ci"
          DATABASE_URL: postgresql+asyncpg://nexus:test@localhost:5432/nexus_test
          REDIS_URL: redis://localhost:6379/0

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --select E9,F63,F7,F82

  miniapp-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx eslint src/ --ext .ts,.tsx --max-warnings 100

  bot-smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_ci
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      DATABASE_URL: postgresql+asyncpg://nexus:nexus_ci@localhost:5432/nexus
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create database schema
        run: PGPASSWORD=nexus_ci psql -h localhost -U nexus -d nexus -f backend/schema.sql

      - name: Start bot in background
        run: |
          cd backend
          PYTHONPATH=. python -m bot.main &
          BOT_PID=$!
          echo $BOT_PID > /tmp/bot.pid

          # Wait for bot to start polling
          for i in $(seq 1 20); do
            if kill -0 $BOT_PID 2>/dev/null; then
              echo "Bot running (attempt $i/20)"
              if [ $i -eq 8 ]; then break; fi
            else
              echo "Bot exited unexpectedly"
              exit 1
            fi
            sleep 1
          done

      - name: Verify bot via getMe
        run: |
          RESPONSE=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getMe")
          echo "getMe: $RESPONSE"
          OK=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok', False))")
          if [ "$OK" != "True" ]; then
            echo "Bot getMe failed!"
            exit 1
          fi
          BOT_USERNAME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['username'])")
          echo "Bot: @$BOT_USERNAME"

      - name: Verify database tables
        run: |
          PGPASSWORD=nexus_ci psql -h localhost -U nexus -d nexus -t -c \
            "SELECT count(*) FROM pg_tables WHERE schemaname = 'public'" | tr -d ' '
          TABLES=$(PGPASSWORD=nexus_ci psql -h localhost -U nexus -d nexus -t -c \
            "SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename" | tr -d ' ')
          echo "Tables: $TABLES"

          for T in tenants users products orders payments conversations messages; do
            if echo "$TABLES" | grep -q "^${T}$"; then
              echo "  [OK] $T"
            else
              echo "  [MISSING] $T"
              exit 1
            fi
          done
          echo "All core tables verified"

      - name: Stop bot
        if: always()
        run: |
          if [ -f /tmp/bot.pid ]; then
            kill $(cat /tmp/bot.pid) 2>/dev/null || true
            sleep 1
          fi
