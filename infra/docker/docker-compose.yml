version: "3.9"

services:
  # --- PostgreSQL ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: nexus_dev
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq

  # --- MinIO (S3-compatible) ---
  minio:
    image: minio/minio
    container_name: nexus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # Console
    volumes:
      - miniodata:/data

  # --- Backend API (FastAPI) ---
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: nexus-api
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_dev@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://nexus:nexus_dev@rabbitmq:5672/
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # --- Bot Service (aiogram) ---
  bot:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: nexus-bot
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_dev@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: python -m bot.main

  # --- Mini App (Vite dev server) ---
  miniapp:
    build:
      context: ../../miniapp
      dockerfile: Dockerfile
    container_name: nexus-miniapp
    ports:
      - "3000:3000"
    volumes:
      - ../../miniapp:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
